name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        type: string
        
permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, zip, gd, curl, bcmath
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies & build assets
        run: |
          npm ci
          npm run build

      - name: Copy .env.example to .env and generate key
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Create required directories with .gitkeep
        run: |
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/app
          mkdir -p storage/logs
          touch storage/framework/cache/.gitkeep
          touch storage/framework/sessions/.gitkeep
          touch storage/framework/views/.gitkeep
          touch storage/app/.gitkeep
          touch storage/logs/.gitkeep

      - name: Create release package
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          zip -r infoshop-${VERSION}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "tests/*" \
            --exclude ".env" \
            --exclude "storage/logs/*.log" \
            --exclude "*.zip"
          echo "Package created: infoshop-${VERSION}.zip"
          ls -lh infoshop-${VERSION}.zip

      - name: Generate version.json
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          VERSION_NUMBER=${VERSION#v}
          cat > version.json << EOF
          {
            "version": "${VERSION_NUMBER}",
            "tag": "${VERSION}",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/infoshop-${VERSION}.zip",
            "released_at": "$(date -u +%Y-%m-%d)",
            "min_php": "8.2",
            "changelog": "${{ github.event.head_commit.message }}"
          }
          EOF
          cat version.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: InfoShop ${{ steps.version.outputs.tag }}
          files: |
            infoshop-${{ steps.version.outputs.tag }}.zip
            version.json
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
